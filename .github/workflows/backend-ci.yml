name: Backend CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: dotly
          POSTGRES_PASSWORD: dotly
          POSTGRES_DB: dotly_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dotly -d dotly_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://dotly:dotly@localhost:5432/dotly_test
      JWT_SECRET: test-secret
      JWT_ISSUER: dotly-backend
      JWT_AUDIENCE: dotly-clients
      CORS_ORIGINS: http://localhost:3001
      REDIS_URL: redis://localhost:6379
      QR_BASE_URL: https://dotly.id/q

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Apply Prisma migrations
        run: npm run prisma:migrate:deploy

      - name: Verify Prisma migration history matches schema
        env:
          PGPASSWORD: dotly
        run: |
          createdb -h localhost -U dotly dotly_shadow
          DIFF_SQL="$(npx prisma migrate diff --from-migrations prisma/migrations --to-schema-datamodel prisma/schema.prisma --shadow-database-url postgresql://dotly:dotly@localhost:5432/dotly_shadow --script)"
          if [ -n "$(printf '%s' "$DIFF_SQL" | tr -d '[:space:]')" ]; then
            printf '%s\n' "$DIFF_SQL"
            echo "Prisma schema drift detected between migration history and schema.prisma"
            exit 1
          fi

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
