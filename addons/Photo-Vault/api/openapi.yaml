# api/openapi.yaml
openapi: 3.0.3
info:
  title: Booster Vault API (Non-AI MVP)
  version: 1.0.0
  description: >
    Booster Vault – Memory/Photo Vault (Non-AI MVP). Encrypted media blobs; server stores metadata + signed URLs only.
servers:
  - url: https://api.boostervault.com
    description: Production
  - url: http://localhost:4000
    description: Local

tags:
  - name: Auth
  - name: Recovery
  - name: Users
  - name: Devices
  - name: VaultKey
  - name: Card
  - name: Media
  - name: Albums
  - name: Exports
  - name: LifeDocs
  - name: Continuity
  - name: Storage
  - name: Sharing
  - name: Billing
  - name: System

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: Stable, machine-readable error code.
          example: VALIDATION_ERROR
          examples: [VALIDATION_ERROR, RECOVERY_REQUIRED]
        message:
          type: string
          example: Invalid request
        statusCode:
          type: number
          nullable: true
          description: Optional HTTP status code field (when returned by framework default errors).
        error:
          type: string
          nullable: true
          description: Optional short error label (when returned by framework default errors).
        details:
          type: object
          additionalProperties: true
          nullable: true
        requestId:
          type: string
          nullable: true
          description: Request correlation id (from x-request-id or generated).

    QueueHealth:
      type: object
      required: [ok]
      properties:
        ok: { type: boolean, example: true }
        counts:
          type: object
          nullable: true
          additionalProperties:
            type: integer
        repeatables:
          type: array
          nullable: true
          items:
            type: object
            required: [name]
            properties:
              name: { type: string }
              id: { type: string, nullable: true }
              every: { type: integer, nullable: true }
              cron: { type: string, nullable: true }
              next: { type: integer, nullable: true }
        error: { type: string, nullable: true }

    Pagination:
      type: object
      properties:
        limit: { type: integer, minimum: 1, maximum: 200, example: 50 }
        cursor: { type: string, nullable: true, example: "eyJpZCI6Ii4uLiJ9" }
        nextCursor: { type: string, nullable: true }

    User:
      type: object
      required: [id, email, isEmailVerified, locale, timezone, createdAt, updatedAt]
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        isEmailVerified: { type: boolean }
        displayName: { type: string, nullable: true }
        locale: { type: string, example: "en" }
        timezone: { type: string, example: "Asia/Kolkata" }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    Session:
      type: object
      required: [accessToken, refreshToken, expiresIn]
      properties:
        accessToken: { type: string }
        refreshToken: { type: string }
        expiresIn: { type: integer, example: 3600 }

    Plan:
      type: object
      required: [code, name, priceCents, currency, interval, features]
      properties:
        code:
          type: string
          enum: [P6M_25, Y1_100, Y1_199, Y5_500]
        name: { type: string, example: "Life Vault – Annual" }
        priceCents: { type: integer, example: 10000 }
        currency: { type: string, example: "USD" }
        interval:
          type: string
          enum: [SIX_MONTHS, YEAR, FIVE_YEARS]
        features:
          type: array
          items: { type: string }

    Subscription:
      type: object
      required: [status, plan, trialStartedAt, trialEndsAt, trialMediaLimit, cancelAtPeriodEnd]
      properties:
        status:
          type: string
          enum: [TRIAL, ACTIVE, PAST_DUE, CANCELED, EXPIRED]
        plan:
          type: string
          enum: [P6M_25, Y1_100, Y1_199, Y5_500]
        trialStartedAt: { type: string, format: date-time }
        trialEndsAt: { type: string, format: date-time, nullable: true }
        trialMediaLimit: { type: integer, example: 50 }
        currentPeriodStart: { type: string, format: date-time, nullable: true }
        currentPeriodEnd: { type: string, format: date-time, nullable: true }
        cancelAtPeriodEnd: { type: boolean }
        stripeCustomerId: { type: string, nullable: true }
        stripeSubscriptionId: { type: string, nullable: true }

    Usage:
      type: object
      required: [totalMediaCount, totalPhotoCount, totalVideoCount, trashedMediaCount, updatedAt]
      properties:
        totalMediaCount: { type: integer, example: 123 }
        totalPhotoCount: { type: integer, example: 120 }
        totalVideoCount: { type: integer, example: 3 }
        trashedMediaCount: { type: integer, example: 2 }
        updatedAt: { type: string, format: date-time }

    Media:
      type: object
      required: [id, type, byteSize, contentType, createdAt, updatedAt, isTrashed]
      properties:
        id: { type: string, format: uuid }
        type: { type: string, enum: [PHOTO, VIDEO, DOCUMENT] }
        byteSize: { type: integer, format: int64 }
        contentType: { type: string, example: "image/jpeg" }
        originalFilename: { type: string, nullable: true }
        title: { type: string, nullable: true }
        note: { type: string, nullable: true }
        takenAt: { type: string, format: date-time, nullable: true }
        locationText: { type: string, nullable: true }
        exifTakenAt: { type: string, format: date-time, nullable: true }
        exifLat: { type: number, nullable: true }
        exifLng: { type: number, nullable: true }
        encAlgo: { type: string, example: "xchacha20poly1305" }
        encMeta:
          type: object
          additionalProperties: true
        thumbObjectKey: { type: string, nullable: true }
        thumbByteSize: { type: integer, format: int64, nullable: true }
        thumbContentType: { type: string, nullable: true }
        thumbEncMeta:
          type: object
          nullable: true
          additionalProperties: true
        thumbUploadedAt: { type: string, format: date-time, nullable: true }
        isTrashed: { type: boolean }
        trashedAt: { type: string, format: date-time, nullable: true }
        purgeAfter: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    PaginatedMediaResponse:
      type: object
      required: [items, hasMore]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/Media" }
        nextCursor: { type: string, nullable: true }
        hasMore: { type: boolean }

    Album:
      type: object
      required: [id, name, createdAt, updatedAt, isDeleted]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        description: { type: string, nullable: true }
        coverMediaId: { type: string, format: uuid, nullable: true }
        isDeleted: { type: boolean }
        deletedAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    Export:
      type: object
      required: [id, userId, scopeType, status, createdAt, updatedAt]
      properties:
        id: { type: string, format: uuid }
        userId: { type: string, format: uuid }
        scopeType: { type: string, enum: [VAULT, ALBUM, DATE_RANGE] }
        scopeAlbumId: { type: string, format: uuid, nullable: true }
        scopeFrom: { type: string, format: date-time, nullable: true }
        scopeTo: { type: string, format: date-time, nullable: true }
        status: { type: string, enum: [QUEUED, RUNNING, READY, FAILED, EXPIRED] }
        errorMessage: { type: string, nullable: true }
        outputObjectKey: { type: string, nullable: true }
        outputByteSize: { type: integer, format: int64, nullable: true }
        readyAt: { type: string, format: date-time, nullable: true }
        expiresAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    PaginatedExportsResponse:
      type: object
      required: [items, hasMore]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/Export" }
        nextCursor: { type: string, nullable: true }
        hasMore: { type: boolean }

    SignedUrl:
      type: object
      required: [url, expiresAt, method, headers]
      properties:
        url: { type: string }
        expiresAt: { type: string, format: date-time }
        method: { type: string, enum: [PUT, GET] }
        headers:
          type: object
          additionalProperties: true

    MultipartUploadSupport:
      type: object
      required: [supported, partSize, minPartSize, maxParts, threshold]
      properties:
        supported: { type: boolean }
        partSize: { type: integer, format: int64, description: "Recommended part size in bytes." }
        minPartSize: { type: integer, format: int64, description: "Minimum part size in bytes (S3 requires 5MiB except last part)." }
        maxParts: { type: integer, description: "Maximum number of parts (S3 limit is 10,000)." }
        threshold: { type: integer, format: int64, description: "Suggested threshold (bytes) to switch from single PUT to multipart." }

    MultipartUploadInitResponse:
      type: object
      required: [uploadId, partSize]
      properties:
        uploadId: { type: string }
        partSize: { type: integer, format: int64 }

    MultipartUploadedPart:
      type: object
      required: [partNumber, etag]
      properties:
        partNumber: { type: integer }
        etag: { type: string }
        size: { type: integer, format: int64, nullable: true }

    MultipartUploadStatusResponse:
      type: object
      required: [parts]
      properties:
        parts:
          type: array
          items: { $ref: "#/components/schemas/MultipartUploadedPart" }

    MultipartUploadPartUrlResponse:
      type: object
      required: [partNumber, uploadUrl]
      properties:
        partNumber: { type: integer }
        uploadUrl: { $ref: "#/components/schemas/SignedUrl" }

    MultipartCompleteRequest:
      type: object
      required: [parts]
      properties:
        parts:
          type: array
          minItems: 1
          items:
            type: object
            required: [partNumber, etag]
            properties:
              partNumber: { type: integer }
              etag: { type: string }

    CreateShareDto:
      type: object
      properties:
        expiresInDays:
          type: integer
          minimum: 1
          maximum: 365
          default: 7

    CreateShareRequest:
      type: object
      required: [createShareDto, encryptedAlbumKey, encryptedMediaKeys, iv, kdfParams]
      properties:
        createShareDto: { $ref: "#/components/schemas/CreateShareDto" }
        encryptedAlbumKey:
          type: string
          description: base64
        encryptedMediaKeys:
          type: array
          items:
            type: object
            required: [mediaId, encryptedKey, iv]
            properties:
              mediaId: { type: string, format: uuid }
              encryptedKey: { type: string, description: base64 }
              iv: { type: string, description: base64 }
        iv:
          type: string
          description: base64
        kdfParams:
          type: object
          required: [iterations, hash, salt]
          properties:
            iterations: { type: integer }
            hash: { type: string }
            salt: { type: string, description: base64 }

    CreateShareStubRequest:
      type: object
      required: [createShareDto]
      properties:
        createShareDto: { $ref: "#/components/schemas/CreateShareDto" }

    UploadShareBundleRequest:
      type: object
      required: [encryptedAlbumKey, encryptedMediaKeys, iv, kdfParams]
      properties:
        encryptedAlbumKey:
          type: string
          description: base64
        encryptedMediaKeys:
          type: array
          items:
            type: object
            required: [mediaId, encryptedKey, iv]
            properties:
              mediaId: { type: string, format: uuid }
              encryptedKey: { type: string, description: base64 }
              iv: { type: string, description: base64 }
        iv:
          type: string
          description: base64
        kdfParams:
          type: object
          required: [iterations, hash, salt]
          properties:
            iterations: { type: integer }
            hash: { type: string }
            salt: { type: string, description: base64 }

    CreateShareResponse:
      type: object
      required: [shareId, shareLink, sharePassphrase, expiresAt]
      properties:
        shareId: { type: string, format: uuid }
        shareLink: { type: string }
        sharePassphrase: { type: string }
        expiresAt: { type: string, format: date-time }

    SharedAlbumMetadata:
      type: object
      required: [shareId, album, expiresAt]
      properties:
        shareId: { type: string, format: uuid }
        album: { $ref: "#/components/schemas/Album" }
        expiresAt: { type: string, format: date-time }
        revokedAt: { type: string, format: date-time, nullable: true }

    UnlockShareRequest:
      type: object
      required: [passphrase]
      properties:
        passphrase: { type: string }

    EncryptedShareBundle:
      type: object
      required: [shareId, encryptedAlbumKey, encryptedMediaKeys, iv, kdfParams]
      properties:
        shareId: { type: string, format: uuid }
        encryptedAlbumKey: { type: string, description: base64 }
        encryptedMediaKeys:
          type: array
          items:
            type: object
            required: [mediaId, encryptedKey, iv]
            properties:
              mediaId: { type: string, format: uuid }
              encryptedKey: { type: string, description: base64 }
              iv: { type: string, description: base64 }
        iv: { type: string, description: base64 }
        kdfParams:
          type: object
          required: [iterations, hash, salt]
          properties:
            iterations: { type: integer }
            hash: { type: string }
            salt: { type: string, description: base64 }
        shareAccessToken:
          type: string
          nullable: true
          description: Short-lived token to authorize share-scoped download URLs.
        tokenExpiresAt:
          type: string
          format: date-time
          nullable: true

    SharedMediaDownloadUrl:
      type: object
      required: [url, expiresAt, method]
      properties:
        url: { type: string }
        expiresAt: { type: string, format: date-time }
        method: { type: string, example: GET }
        headers:
          type: object
          nullable: true
          additionalProperties: true
        media:
          type: object
          nullable: true
          required: [id, type, byteSize, contentType, encMeta, createdAt, updatedAt]
          properties:
            id: { type: string, format: uuid }
            type: { type: string, enum: [PHOTO, VIDEO, DOCUMENT] }
            byteSize: { type: integer, format: int64 }
            contentType: { type: string }
            encMeta:
              type: object
              additionalProperties: true
            thumbByteSize: { type: integer, format: int64, nullable: true }
            thumbContentType: { type: string, nullable: true }
            thumbEncMeta:
              type: object
              nullable: true
              additionalProperties: true
            thumbUploadedAt: { type: string, format: date-time, nullable: true }
            originalFilename: { type: string, nullable: true }
            createdAt: { type: string, format: date-time }
            updatedAt: { type: string, format: date-time }

    SharedMediaMetadataItem:
      type: object
      required: [id, type, byteSize, contentType, encMeta, createdAt, updatedAt]
      properties:
        id: { type: string, format: uuid }
        type: { type: string, enum: [PHOTO, VIDEO, DOCUMENT] }
        byteSize: { type: integer, format: int64 }
        contentType: { type: string }
        encMeta:
          type: object
          additionalProperties: true
        thumbByteSize: { type: integer, format: int64, nullable: true }
        thumbContentType: { type: string, nullable: true }
        thumbEncMeta:
          type: object
          nullable: true
          additionalProperties: true
        thumbUploadedAt: { type: string, format: date-time, nullable: true }
        originalFilename: { type: string, nullable: true }
        exifTakenAt: { type: string, format: date-time, nullable: true }
        takenAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    SharedMediaMetadataList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/SharedMediaMetadataItem" }
        nextCursor:
          type: integer
          nullable: true
          description: Cursor for the next page (index into the snapshot order).

    ShareAnalytics:
      type: object
      required: [shareId, viewCount]
      properties:
        shareId: { type: string, format: uuid }
        viewCount: { type: integer, minimum: 0 }
        lastViewedAt: { type: string, format: date-time, nullable: true }

    CardContactGate:
      type: string
      enum: [OPEN, REQUEST_REQUIRED, HIDDEN]

    CardAttachmentKind:
      type: string
      enum: [ALBUM, MEDIA, LIFE_DOC]

    CardAttachmentResolvedLink:
      type: object
      required: [kind, shareId, shareLink, expiresAt]
      properties:
        kind:
          type: string
          enum: [SHARED_ALBUM]
        shareId: { type: string, format: uuid }
        shareLink: { type: string }
        expiresAt: { type: string, format: date-time }

    CardContactRequestStatus:
      type: string
      enum: [PENDING, APPROVED, DENIED, EXPIRED, REVOKED]

    CardModePublic:
      type: object
      required:
        - modeId
        - cardPublicId
        - slug
        - name
        - contactGate
        - indexingEnabled
        - createdAt
        - updatedAt
      properties:
        modeId: { type: string, format: uuid }
        cardPublicId: { type: string }
        slug: { type: string }
        name: { type: string }
        headline: { type: string, nullable: true }
        bio: { type: string, nullable: true }
        contactGate: { $ref: "#/components/schemas/CardContactGate" }
        indexingEnabled: { type: boolean }
        themeKey: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    CreateCardModeDto:
      type: object
      required: [name, slug]
      properties:
        name: { type: string, minLength: 2, maxLength: 80 }
        slug:
          type: string
          minLength: 2
          maxLength: 40
          pattern: "^[a-z0-9-]+$"
        headline: { type: string, maxLength: 140, nullable: true }
        bio: { type: string, maxLength: 1000, nullable: true }
        contactGate: { $ref: "#/components/schemas/CardContactGate" }
        indexingEnabled: { type: boolean, nullable: true }
        themeKey: { type: string, maxLength: 40, nullable: true }

    ListCardModesResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/CardModePublic" }

    UpdateCardUsernameDto:
      type: object
      required: [username]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 24
          pattern: "^[a-z0-9_]{3,24}$"

    UpdateCardUsernameResponse:
      type: object
      required: [username]
      properties:
        username: { type: string }

    ResolveUsernameResponse:
      type: object
      required: [publicId]
      properties:
        publicId: { type: string }

    CardAttachment:
      type: object
      required: [id, kind, refId, sortOrder]
      properties:
        id: { type: string, format: uuid }
        kind: { $ref: "#/components/schemas/CardAttachmentKind" }
        refId: { type: string }
        label: { type: string, nullable: true }
        sortOrder: { type: integer }
        expiresAt: { type: string, format: date-time, nullable: true }
        revokedAt: { type: string, format: date-time, nullable: true }
        resolvedLink:
          nullable: true
          allOf:
            - { $ref: "#/components/schemas/CardAttachmentResolvedLink" }

    CreateCardAttachmentDto:
      type: object
      required: [kind, refId]
      properties:
        kind:
          type: string
          enum: [ALBUM]
        refId: { type: string, format: uuid }
        label: { type: string, maxLength: 120, nullable: true }
        sortOrder: { type: integer, minimum: 0, nullable: true }

    ListCardAttachmentsResponse:
      type: object
      required: [attachments]
      properties:
        attachments:
          type: array
          items: { $ref: "#/components/schemas/CardAttachment" }

    ReorderCardAttachmentItemDto:
      type: object
      required: [attachmentId, sortOrder]
      properties:
        attachmentId: { type: string, format: uuid }
        sortOrder: { type: integer, minimum: 0 }

    ReorderCardAttachmentsDto:
      type: object
      required: [items]
      properties:
        items:
          type: array
          minItems: 1
          items: { $ref: "#/components/schemas/ReorderCardAttachmentItemDto" }

    UpdateCardAttachmentDto:
      type: object
      properties:
        label: { type: string, maxLength: 120, nullable: true }
        sortOrder: { type: integer, minimum: 0, nullable: true }
        expiresAt: { type: string, format: date-time, nullable: true }

    ReorderCardAttachmentsOrderedDto:
      type: object
      required: [attachmentIds]
      properties:
        attachmentIds:
          type: array
          minItems: 1
          items: { type: string, format: uuid }

    ReorderCardAttachmentsResponse:
      type: object
      required: [attachments]
      properties:
        attachments:
          type: array
          items: { $ref: "#/components/schemas/CardAttachment" }

    GetPublicCardModeResponse:
      type: object
      required: [mode, attachments]
      properties:
        mode: { $ref: "#/components/schemas/CardModePublic" }
        attachments:
          type: array
          items: { $ref: "#/components/schemas/CardAttachment" }

    CreateCardContactRequestDto:
      type: object
      required: [requesterName, requesterEmail]
      properties:
        requesterName: { type: string, minLength: 2, maxLength: 80 }
        requesterEmail: { type: string, format: email }
        requesterPhone: { type: string, maxLength: 30, nullable: true }
        message: { type: string, maxLength: 1000, nullable: true }
        captchaToken:
          type: string
          maxLength: 5000
          nullable: true
          description: Turnstile token (required when CAPTCHA is enabled)

    CreateCardContactRequestResponse:
      type: object
      required: [requestId, status, createdAt]
      properties:
        requestId: { type: string, format: uuid }
        status: { $ref: "#/components/schemas/CardContactRequestStatus" }
        createdAt: { type: string, format: date-time }

    ApproveCardContactRequestDto:
      type: object
      properties:
        expiresInDays: { type: integer, minimum: 1, maximum: 365, nullable: true }
        expiresAt: { type: string, format: date-time, nullable: true }

    ApproveCardContactRequestResponse:
      type: object
      required: [grantId, token, expiresAt]
      properties:
        grantId: { type: string, format: uuid }
        token: { type: string }
        expiresAt: { type: string, format: date-time }

    CardContactRevealResponse:
      type: object
      properties:
        displayName: { type: string, nullable: true }
        email: { type: string, format: email, nullable: true }

    CardModeAnalyticsResponse:
      type: object
      required:
        - modeId
        - viewsTotal
        - contactRequestsTotal
        - approvalsTotal
        - denialsTotal
        - activeGrantsTotal
      properties:
        modeId: { type: string, format: uuid }
        viewsTotal: { type: integer, minimum: 0 }
        lastViewedAt: { type: string, format: date-time, nullable: true }
        contactRequestsTotal: { type: integer, minimum: 0 }
        approvalsTotal: { type: integer, minimum: 0 }
        denialsTotal: { type: integer, minimum: 0 }
        activeGrantsTotal: { type: integer, minimum: 0 }

    ListCardModeAnalyticsResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/CardModeAnalyticsResponse" }

    SuccessResponse:
      type: object
      required: [success]
      properties:
        success: { type: boolean, example: true }

    CardContactRequestListItem:
      type: object
      required: [id, status, requesterName, requesterEmail, createdAt]
      properties:
        id: { type: string, format: uuid }
        status: { $ref: "#/components/schemas/CardContactRequestStatus" }
        requesterName: { type: string }
        requesterEmail: { type: string, format: email }
        requesterPhone: { type: string, nullable: true }
        message: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }

    ListCardContactRequestsResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/CardContactRequestListItem" }
        nextCursor: { type: string, nullable: true }

    CreateUploadIntentRequest:
      type: object
      required: [type, byteSize, contentType, encAlgo, encMeta]
      properties:
        type: { type: string, enum: [PHOTO, VIDEO, DOCUMENT] }
        byteSize: { type: integer, format: int64 }
        contentType: { type: string }
        originalFilename: { type: string, nullable: true }
        sha256CiphertextB64: { type: string, nullable: true }
        encAlgo: { type: string, example: "xchacha20poly1305" }
        encMeta:
          type: object
          additionalProperties: true
        exifTakenAt: { type: string, format: date-time, nullable: true }
        exifLat: { type: number, nullable: true }
        exifLng: { type: number, nullable: true }
        takenAt: { type: string, format: date-time, nullable: true }
        locationText: { type: string, nullable: true }
        title: { type: string, nullable: true }
        note: { type: string, nullable: true }

    CreateUploadIntentResponse:
      type: object
      required: [media, signedUploadUrl]
      properties:
        media: { $ref: "#/components/schemas/Media" }
        signedUploadUrl: { $ref: "#/components/schemas/SignedUrl" }
        signedThumbnailUploadUrl:
          nullable: true
          allOf:
            - { $ref: "#/components/schemas/SignedUrl" }
        multipart:
          nullable: true
          allOf:
            - { $ref: "#/components/schemas/MultipartUploadSupport" }

    ThumbnailUploadIntentRequest:
      type: object
      required: [byteSize, contentType, encMeta]
      properties:
        byteSize: { type: integer, format: int64 }
        contentType: { type: string }
        encMeta:
          type: object
          additionalProperties: true

    ThumbnailUploadIntentResponse:
      type: object
      required: [media, signedThumbnailUploadUrl]
      properties:
        media: { $ref: "#/components/schemas/Media" }
        signedThumbnailUploadUrl: { $ref: "#/components/schemas/SignedUrl" }

    CompleteUploadRequest:
      type: object
      properties:
        etag:
          type: string
          nullable: true
          description: "Provider ETag or checksum returned after upload (optional)."

    CreateAlbumRequest:
      type: object
      required: [name]
      properties:
        name: { type: string }
        description: { type: string, nullable: true }
        coverMediaId: { type: string, format: uuid, nullable: true }

    UpdateAlbumRequest:
      type: object
      properties:
        name: { type: string }
        description: { type: string, nullable: true }
        coverMediaId: { type: string, format: uuid, nullable: true }

    AddAlbumItemsRequest:
      type: object
      required: [mediaIds]
      properties:
        mediaIds:
          type: array
          minItems: 1
          items: { type: string, format: uuid }

    ReorderAlbumItemsRequest:
      type: object
