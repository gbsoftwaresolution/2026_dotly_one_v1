x-notes:
  upload_workflow: |
    1) Client encrypts file -> ciphertext bytes.
    2) POST /v1/media/upload-intents with metadata + encryption meta (no secrets).
    3) Receive signed PUT URL. Upload ciphertext bytes directly to object storage.
    4) POST /v1/media/{id}/complete-upload with ETag/checksum.
    5) Media appears in Library/Timeline/Search (unless trashed).
  trash_rules: |
    - DELETE /v1/media/{id} sets is_trashed=true, purge_after=trashed_at+30d.
    - POST /v1/media/{id}/restore reverses trash flags.
    - POST /v1/media/{id}/purge permanently deletes blob + metadata.
  plan_enforcement: |
    - Server blocks upload-intents when trial expired or limits exceeded.
    - Viewing and exporting must remain available even when uploads are blocked.
