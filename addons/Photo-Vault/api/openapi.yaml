  responses:
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: Not Found
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Conflict:
      description: Conflict
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

paths:
  # =========================
  # Recovery
  # =========================
  /v1/recovery/status:
    get:
      tags: [Recovery]
      summary: Get recovery status for current user
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [enabled]
                properties:
                  enabled: { type: boolean }
                  createdAt: { type: string, format: date-time, nullable: true }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/recovery/accept-risk:
    post:
      tags: [Recovery]
      summary: Explicitly accept risk of proceeding without recovery
      description: >
        Idempotent. Sets a server-side timestamp indicating the user explicitly accepted the risk of using the vault
        without enabling a recovery phrase.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [acceptedAt]
                properties:
                  acceptedAt: { type: string, format: date-time }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/recovery/enable:
    post:
      tags: [Recovery]
      summary: Enable recovery phrase for current user
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EnableRecoveryRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                required: [success]
                properties:
                  success: { type: boolean, example: true }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /v1/recovery/disable:
    delete:
      tags: [Recovery]
      summary: Disable recovery phrase for current user
      description: Requires password re-authentication.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DisableRecoveryRequest" }
      responses:
        "204": { description: No Content }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /v1/recovery/bundle:
    post:
      tags: [Recovery]
      security: []
      summary: Get encrypted recovery bundle (restore flow)
      description: Rate-limited. Returns the encrypted bundle without JWT auth.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RecoveryBundleRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RecoveryBundleResponse" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }

  # =========================
  # System
  # =========================
  /v1/health:
    get:
      tags: [System]
      security: []
      summary: Health check
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }

  /v1/queue/health:
    get:
      tags: [System]
      summary: Queue + worker health
      description: >
        Operational endpoint reporting Redis connectivity, BullMQ queue counts/repeatable jobs,
        and worker liveness via Postgres-backed heartbeats.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [ok, requestId, redis, workers, queues]
                properties:
                  ok: { type: boolean, example: true }
                  requestId: { type: string, nullable: true }
                  redis:
                    type: object
                    required: [ok]
                    properties:
                      ok: { type: boolean, example: true }
                      latencyMs: { type: integer, nullable: true, example: 2 }
                      error: { type: string, nullable: true }
                  workers:
                    type: object
                    required: [ok, staleAfterSeconds, instances]
                    properties:
                      ok: { type: boolean, example: true }
                      staleAfterSeconds: { type: integer, example: 60 }
                      instances:
                        type: array
                        items:
                          type: object
                          required: [kind, instanceId, startedAt, lastSeenAt, isStale]
                          properties:
                            kind: { type: string, example: bullmq }
                            instanceId: { type: string, example: "host-1234-abc12345" }
                            startedAt: { type: string, format: date-time }
                            lastSeenAt: { type: string, format: date-time }
                            isStale: { type: boolean, example: false }
                      error: { type: string, nullable: true }
                  queues:
                    type: object
                    required: [exports, purge, thumbnails]
                    properties:
                      exports: { $ref: "#/components/schemas/QueueHealth" }
                      purge: { $ref: "#/components/schemas/QueueHealth" }
                      thumbnails: { $ref: "#/components/schemas/QueueHealth" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  # =========================
  # Auth
  # =========================
  /v1/auth/register:
    post:
      tags: [Auth]
      security: []
      summary: Register with email/password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string, minLength: 8 }
                displayName: { type: string, nullable: true }
                locale: { type: string, example: "en" }
                timezone: { type: string, example: "Asia/Kolkata" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                required: [user, session]
                properties:
                  user: { $ref: "#/components/schemas/User" }
                  session: { $ref: "#/components/schemas/Session" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /v1/auth/login:
    post:
      tags: [Auth]
      security: []
      summary: Login and obtain tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [user, session]
                properties:
