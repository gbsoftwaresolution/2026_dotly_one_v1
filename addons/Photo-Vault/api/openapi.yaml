        subcategory: { $ref: "#/components/schemas/LifeDocSubcategory" }
        customSubcategory: { type: string, nullable: true }
        title: { type: string }
        issuingAuthority: { type: string, nullable: true }
        issueDate: { type: string, nullable: true }
        expiryDate: { type: string, nullable: true }
        renewalRequired: { type: boolean, nullable: true }
        reminderSetting: { $ref: "#/components/schemas/LifeDocReminderSetting" }
        visibility: { $ref: "#/components/schemas/LifeDocVisibility" }
        accessRoles: { $ref: "#/components/schemas/LifeDocAccessRolesInput" }

    ReplaceLifeDocDto:
      type: object
      required: [mediaId]
      properties:
        mediaId: { type: string, format: uuid }
        title: { type: string, nullable: true }
        issuingAuthority: { type: string, nullable: true }
        issueDate: { type: string, nullable: true }
        expiryDate: { type: string, nullable: true }
