  # =========================
  # Media
  # =========================
  /v1/media:
    get:
      tags: [Media]
      summary: List media (Library view)
      description: >
        Excludes trashed media by default.
        If albumId is provided, returns items in album order (by position).
      parameters:
        - in: query
          name: includeTrashed
          schema: { type: boolean, default: false }
        - in: query
          name: limit
          schema: { type: integer, default: 50, minimum: 1, maximum: 200 }
        - in: query
          name: cursor
          description: >
            Pagination cursor returned from the previous page.
            For library view, this is an opaque cursor.
            For album view (albumId set), cursor format is "position,mediaId".
          schema: { type: string, nullable: true }
        - in: query
          name: from
          schema: { type: string, format: date-time, nullable: true }
        - in: query
          name: to
          schema: { type: string, format: date-time, nullable: true }
        - in: query
          name: albumId
          description: >
            Optional album filter. When set, media is returned in album order.
            Requires ownership: returns 404 if the album does not exist, and 403 if the album is not owned by the current user.
          schema: { type: string, format: uuid, nullable: true }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [media]
                properties:
                  media: { $ref: "#/components/schemas/PaginatedMediaResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/media/multipart/support:
    get:
      tags: [Media]
      summary: Get multipart upload capabilities
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [multipart]
                properties:
                  multipart:
                    type: object
                    required: [supported, partSize, minPartSize, maxParts, threshold]
                    properties:
                      supported: { type: boolean }
                      partSize: { type: integer, format: int64 }
                      minPartSize: { type: integer, format: int64 }
                      maxParts: { type: integer, format: int32 }
                      threshold: { type: integer, format: int64 }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/media/upload-intents:
    post:
      tags: [Media]
      summary: Create upload intent and receive signed PUT URL
      description: >
        Server checks plan limits (trial/time/media count). If allowed, creates a media row and returns signed upload URL.
      parameters:
        - in: header
          name: Idempotency-Key
          required: false
          description: >
            Unique key for ensuring idempotency of this request. If provided and a previous request with the same key succeeded,
            the same response will be returned. If the request body differs, 409 Conflict will be returned.
          schema:
            type: string
            format: uuid
            example: "123e4567-e89b-12d3-a456-426614174000"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateUploadIntentRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CreateUploadIntentResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }

