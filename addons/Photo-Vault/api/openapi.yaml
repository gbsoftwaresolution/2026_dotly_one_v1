  # =========================
  # Storage
  # =========================
  /v1/storage/local-upload:
    put:
      tags: [Storage]
      security: []
      summary: Local dev upload (token-authorized)
      description: Raw body upload used in local filesystem storage mode.
      parameters:
        - in: query
          name: key
          required: true
          schema: { type: string }
        - in: query
          name: token
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        "200":
          description: OK
          headers:
            ETag:
              description: SHA-256 hex digest
              schema: { type: string }
          content:
            text/plain:
              schema: { type: string, example: OK }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /v1/storage/local-download:
    get:
      tags: [Storage]
      security: []
      summary: Local dev download (token-authorized)
      parameters:
        - in: query
          name: key
          required: true
          schema: { type: string }
        - in: query
          name: token
          required: true
          schema: { type: string }
        - in: query
          name: filename
          required: false
          schema: { type: string, nullable: true }
        - in: query
          name: contentType
          required: false
          schema: { type: string, nullable: true }
      responses:
        "200":
          description: OK
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

