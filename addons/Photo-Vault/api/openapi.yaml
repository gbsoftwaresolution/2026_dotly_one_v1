          items:
            type: object
            required: [mediaId, position]
            properties:
              mediaId: { type: string, format: uuid }
              position: { type: integer, format: int64 }

    UpdateMediaRequest:
      type: object
      properties:
        title: { type: string, nullable: true }
        note: { type: string, nullable: true }
        takenAt: { type: string, format: date-time, nullable: true }
        locationText: { type: string, nullable: true }

    CreateExportRequest:
      type: object
      required: [scopeType]
      properties:
        scopeType: { type: string, enum: [VAULT, ALBUM, DATE_RANGE] }
        scopeAlbumId: { type: string, format: uuid, nullable: true }
        scopeFrom: { type: string, format: date-time, nullable: true }
        scopeTo: { type: string, format: date-time, nullable: true }

    CreateCheckoutSessionRequest:
      type: object
      required: [planCode, successUrl, cancelUrl]
      properties:
        planCode:
          type: string
          description: Exposed plan code
          enum: [P6M_25, Y1_100, Y1_199]
        successUrl: { type: string }
        cancelUrl: { type: string }

    CreateCheckoutSessionResponse:
      type: object
      required: [checkoutUrl, sessionId]
      properties:
        checkoutUrl: { type: string }
        sessionId: { type: string }

    KdfParams:
      type: object
      required: [iterations, hash, salt]
      properties:
        iterations: { type: integer, format: int32, example: 200000 }
        hash: { type: string, example: "SHA-256" }
        salt: { type: string, description: Base64-encoded salt }

    EnableRecoveryRequest:
      type: object
      required: [encryptedMasterKey, iv, kdfParams]
      properties:
        encryptedMasterKey: { type: string, description: Base64-encoded bytes }
        iv: { type: string, description: Base64-encoded 12-byte IV }
        kdfParams: { $ref: "#/components/schemas/KdfParams" }

    DisableRecoveryRequest:
      type: object
      required: [password]
      properties:
        password: { type: string }

    RecoveryBundleRequest:
      type: object
      required: [userId]
      properties:
        userId: { type: string, format: uuid }

    RecoveryBundleResponse:
      type: object
      required: [encryptedMasterKey, iv, kdfParams]
      properties:
        encryptedMasterKey: { type: string, description: Base64-encoded bytes }
        iv: { type: string, description: Base64-encoded 12-byte IV }
        kdfParams: { $ref: "#/components/schemas/KdfParams" }

    UpsertVaultKeyBundleRequest:
      type: object
      required: [encryptedMasterKey, iv, kdfParams]
      properties:
        encryptedMasterKey: { type: string, description: Base64-encoded bytes }
        iv: { type: string, description: Base64-encoded bytes }
        kdfParams: { $ref: "#/components/schemas/KdfParams" }

    ResetVaultKeyBundleRequest:
      type: object
      required: [password]
      properties:
        password: { type: string }

    VaultKeyBundleStatus:
      type: object
      required: [enabled]
      properties:
        enabled: { type: boolean }
        createdAt: { type: string, format: date-time, nullable: true }
        updatedAt: { type: string, format: date-time, nullable: true }

    Device:
      type: object
      required: [sessionId, deviceName, createdAt, lastSeenAt, isCurrent]
      properties:
        sessionId: { type: string }
        deviceName: { type: string }
        browser: { type: string, nullable: true }
        os: { type: string, nullable: true }
        deviceType: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        lastSeenAt: { type: string, format: date-time }
        ipAddress: { type: string, nullable: true }
        isCurrent: { type: boolean }

    DevicesListResponse:
      type: object
      required: [devices]
      properties:
        devices:
          type: array
          items: { $ref: "#/components/schemas/Device" }

    RenameDeviceRequest:
      type: object
      required: [deviceName]
      properties:
        deviceName: { type: string }

    RevokeDeviceResponse:
      type: object
      required: [success]
      properties:
        success: { type: boolean, example: true }

    RevokeOthersResponse:
      type: object
      required: [revokedCount]
      properties:
        revokedCount: { type: integer, format: int32 }

    CreateCryptoInvoiceRequest:
      type: object
      required: [planCode]
      properties:
        planCode:
          type: string
          enum: [P6M_25, Y1_100, Y1_199]

    CryptoInvoiceResponse:
      type: object
