    UpdateLifeDocMaskedPrivacyDto:
      type: object
      required: [maskedMode]
      properties:
        maskedMode: { type: boolean }
        maskedHideExpiry: { type: boolean, nullable: true }
        aliasTitle: { type: string, nullable: true }

    QuietHours:
      type: object
      nullable: true
      properties:
        start: { type: string, nullable: true, example: "22:00" }
        end: { type: string, nullable: true, example: "07:00" }

    ReminderChannels:
      type: object
      required: [inApp]
      properties:
        inApp: { type: boolean }
        email: { type: boolean, nullable: true }
        push: { type: boolean, nullable: true }

    UpdateLifeDocRemindersDto:
      type: object
      properties:
        reminderSetting: { $ref: "#/components/schemas/LifeDocReminderSetting" }
        reminderCustomDays:
          type: array
          nullable: true
          items: { type: integer, format: int32 }
        quietHours: { $ref: "#/components/schemas/QuietHours" }
        channels: { $ref: "#/components/schemas/ReminderChannels" }
        notifySharedMembers: { type: boolean, nullable: true }

    LifeDocResponse:
      type: object
      required:
        - id
        - ownerId
        - category
        - subcategory
        - title
        - renewalRequired
        - reminderSetting
        - visibility
        - status
        - versionGroupId
        - fileHash
        - uploadTimestamp
        - createdAt
        - updatedAt
        - vaultMediaId
        - viewerRole
      properties:
        id: { type: string, format: uuid }
        ownerId: { type: string, format: uuid }
        ownerDisplayName: { type: string, nullable: true }
        category: { $ref: "#/components/schemas/LifeDocCategory" }
        subcategory: { $ref: "#/components/schemas/LifeDocSubcategory" }
        customSubcategory: { type: string, nullable: true }
        title: { type: string }
        issuingAuthority: { type: string, nullable: true }
        issueDate: { type: string, nullable: true }
        expiryDate: { type: string, nullable: true }
        renewalRequired: { type: boolean }
        renewalState: { $ref: "#/components/schemas/LifeDocRenewalState" }
        reminderSetting: { $ref: "#/components/schemas/LifeDocReminderSetting" }
        reminderCustomDays:
          type: array
          nullable: true
          items: { type: integer, format: int32 }
        quietHours: { $ref: "#/components/schemas/QuietHours" }
        notifySharedMembers: { type: boolean, nullable: true }
        lastRemindedAt: { type: string, format: date-time, nullable: true }
        visibility: { $ref: "#/components/schemas/LifeDocVisibility" }
        status: { $ref: "#/components/schemas/LifeDocStatus" }
        versionGroupId: { type: string, format: uuid }
        fileHash: { type: string }
        uploadTimestamp: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        vaultMediaId: { type: string, format: uuid }
        viewerRole: { $ref: "#/components/schemas/LifeDocAccessRole" }
        maskedMode: { type: boolean, nullable: true }
        maskedHideExpiry: { type: boolean, nullable: true }
        aliasTitle: { type: string, nullable: true }

    LifeDocListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/LifeDocResponse" }

    LifeDocsSearchResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/LifeDocResponse" }

    LifeDocsTimelineMonthGroup:
      type: object
      required: [month, items]
      properties:
        month: { type: string, example: "2026-02" }
        items:
          type: array
          items: { $ref: "#/components/schemas/LifeDocResponse" }

    LifeDocsTimelineResponse:
      type: object
      required: [months, groups]
      properties:
        months: { type: integer, format: int32 }
        groups:
          type: array
          items: { $ref: "#/components/schemas/LifeDocsTimelineMonthGroup" }

    LifeDocsRenewalSummaryResponse:
      type: object
      required: [notRequired, upcoming, inProgress, completed, blocked]
      properties:
        notRequired: { type: integer, format: int32 }
        upcoming: { type: integer, format: int32 }
        inProgress: { type: integer, format: int32 }
        completed: { type: integer, format: int32 }
        blocked: { type: integer, format: int32 }

    LifeDocsFamilyOverviewResponse:
      type: object
      required: [myExpiringSoon, childrenExpiringSoon, sharedWithMe, needsRenewal]
      properties:
        myExpiringSoon: { type: integer, format: int32 }
        childrenExpiringSoon: { type: integer, format: int32 }
        sharedWithMe: { type: integer, format: int32 }
        needsRenewal: { type: integer, format: int32 }

    LifeDocVersionItem:
      type: object
      required: [versionId, uploadTimestamp, fileHash, status, isLatest]
      properties:
        versionId: { type: string }
        uploadTimestamp: { type: string, format: date-time }
        fileHash: { type: string }
        status: { $ref: "#/components/schemas/LifeDocStatus" }
        isLatest: { type: boolean }

    LifeDocVersionsResponse:
      type: object
      required: [id, versionGroupId, versions]
      properties:
        id: { type: string, format: uuid }
        versionGroupId: { type: string, format: uuid }
