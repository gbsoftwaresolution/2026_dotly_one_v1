  # =========================
  # Exports
  # =========================
  /v1/exports:
    get:
      tags: [Exports]
      summary: List export jobs
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 50, minimum: 1, maximum: 200 }
        - in: query
          name: cursor
          schema: { type: string, nullable: true }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [exports]
                properties:
                  exports: { $ref: "#/components/schemas/PaginatedExportsResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }

    post:
      tags: [Exports]
      summary: Create export job
      parameters:
        - in: header
          name: Idempotency-Key
          required: false
          description: >
            Unique key for ensuring idempotency of this request. If provided and a previous request with the same key succeeded,
            the same response will be returned. If the request body differs, 409 Conflict will be returned.
          schema:
            type: string
            format: uuid
            example: "123e4567-e89b-12d3-a456-426614174000"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateExportRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                required: [export]
                properties:
                  export: { $ref: "#/components/schemas/Export" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /v1/exports/{exportId}:
    get:
      tags: [Exports]
      summary: Get export job
      parameters:
        - in: path
          name: exportId
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [export]
                properties:
                  export: { $ref: "#/components/schemas/Export" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

    delete:
      tags: [Exports]
      summary: Delete export job
      parameters:
        - in: path
          name: exportId
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204": { description: No Content }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

