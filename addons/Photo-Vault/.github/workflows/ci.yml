name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: booster_vault
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user -d booster_vault"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      CI: true
      NODE_ENV: test
      DATABASE_URL: postgresql://user:password@localhost:5432/booster_vault
      REDIS_URL: redis://localhost:6379
      PORT: 4000
      WEB_ORIGIN: http://127.0.0.1:3000
      VITE_API_URL: http://127.0.0.1:4000

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 8.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm type-check

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Web unit tests
        run: pnpm --filter @booster-vault/web test

      - name: Install Playwright browsers
        run: pnpm e2e:install

      - name: Migrate DB
        run: pnpm --filter @booster-vault/api prisma:migrate:deploy

      - name: Playwright e2e
        run: pnpm e2e
